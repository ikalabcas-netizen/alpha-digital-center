version: "3.9"

# MinIO self-hosted cho ADC Marketing
# Deploy như Custom Docker Compose service trên Coolify project "Alpha Digital Center".
#
# Cần set env vars (qua Coolify UI) trước khi deploy:
#   MINIO_ROOT_USER      — admin username (min 3 chars, alphanumeric)
#   MINIO_ROOT_PASSWORD  — admin password (min 8 chars, strong)
#
# Coolify sẽ tự map 2 ports ra internet:
#   9000 (S3 API)      → domain: cdn.alphacenter.vn
#   9001 (Web Console) → domain: console.alphacenter.vn

services:
  minio:
    image: minio/minio:latest
    container_name: adc-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: https://console.alphacenter.vn
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  minio-data:
    driver: local
