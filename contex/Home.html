<script type="text/babel" data-presets="env,react">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "accent": "cyan"
}/*EDITMODE-END*/;
const ACCENT_PRESETS = {
  cyan: { main: '#06b6d4', hover: '#0891b2', light: '#67e8f9', bg: '#ecfeff' },
  teal: { main: '#0d9488', hover: '#0f766e', light: '#5eead4', bg: '#f0fdfa' },
  mint: { main: '#10b981', hover: '#059669', light: '#6ee7b7', bg: '#ecfdf5' },
};
function applyAccent(k) {
  const p = ACCENT_PRESETS[k] || ACCENT_PRESETS.cyan;
  const r = document.documentElement;
  r.style.setProperty('--accent', p.main);
  r.style.setProperty('--accent-600', p.hover);
  r.style.setProperty('--accent-300', p.light);
  r.style.setProperty('--accent-50', p.bg);
}
applyAccent(TWEAKS.accent);

const IMG = {
  heroLab: 'https://images.unsplash.com/photo-1606811971618-4486d14f3f99?w=1400&q=80',
  cadcam: 'https://images.unsplash.com/photo-1629909613654-28e377c37b09?w=1000&q=80',

  office: 'https://images.unsplash.com/photo-1606811842914-f74209f127d1?w=1400&q=80',
  team: 'https://images.unsplash.com/photo-1559757175-0eb30cd8c063?w=1400&q=80',
  hands: 'https://images.unsplash.com/photo-1582719471384-894fbb16e074?w=1000&q=80',

/* === LOGO === */
function Logo({ size = 40, variant = 'light' }) {
  const dark = variant === 'dark';
  return (
    <div style={{ display: 'inline-flex', alignItems: 'center', gap: 12 }}>
      <svg width={size} height={size} viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="19" stroke={dark ? '#C9A961' : '#0B1220'} strokeWidth="1.2"/>
        <path d="M 20 8 L 28 30 L 24 30 L 22 24 L 18 24 L 16 30 L 12 30 Z" fill={dark ? '#E3CC8F' : '#0B1220'}/>
        <circle cx="20" cy="20" r="2" fill="#C9A961"/>
      </svg>

        <span style={{ fontFamily: 'var(--font-display)', fontSize: size * 0.48, fontWeight: 600, color: dark ? '#fff' : 'var(--ink-900)', letterSpacing: '-0.02em' }}>
          alpha<span style={{ color: '#C9A961' }}>.</span>
        </span>
        <span style={{ fontFamily: 'var(--font-mono)', fontSize: size * 0.22, letterSpacing: '0.2em', color: dark ? 'rgba(255,255,255,0.5)' : 'var(--ink-500)', marginTop: 4, textTransform: 'uppercase' }}>
          Digital Center
        </span>
      </div>
    </div>
  );
}

/* === ROUTER === */
const ROUTES = [
  { id: 'home', label: 'Trang chủ' },
  { id: 'gioi-thieu', label: 'Giới thiệu' },
  { id: 'san-pham', label: 'Sản phẩm' },
  { id: 'tin-tuc', label: 'Tin tức' },
  { id: 'bao-hanh', label: 'Bảo hành' },
  { id: 'tuyen-dung', label: 'Tuyển dụng' },
  { id: 'lien-he', label: 'Liên hệ' },
];

function useRoute() {
  const parseHash = () => {
    const h = (window.location.hash || '#home').replace('#', '');
    return ROUTES.find(r => r.id === h) ? h : 'home';
  };
  const [route, setRoute] = React.useState(parseHash);
  React.useEffect(() => {
    const onHash = () => {
      setRoute(parseHash());
      window.scrollTo({ top: 0, behavior: 'instant' });
    };
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);
  return [route, (r) => { window.location.hash = r; }];
}

/* === HEADER === */

    <div style={{ background: 'var(--navy-950)', color: 'rgba(255,255,255,0.58)', fontSize: 12, padding: '8px 0' }}>

        <div style={{ display: 'flex', gap: 22, flexWrap: 'wrap' }}>
          <span>📞 0378 422 496</span>
          <span>✉ info@alphacenter.vn</span>
        </div>
        <div style={{ display: 'flex', gap: 22, alignItems: 'center' }}>
          <span>📍 242/12 Phạm Văn Hai, Q. Tân Bình, TP.HCM</span>

        </div>

}

function Header({ current }) {
  const [scrolled, setScrolled] = React.useState(false);
  const [open, setOpen] = React.useState(false);
  React.useEffect(() => {
    const h = () => setScrolled(window.scrollY > 24);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);
  return (
    <>
      <TopBar/>
      <header style={{
        position: 'sticky', top: 0, zIndex: 50,
        background: scrolled ? 'rgba(255,255,255,0.92)' : '#fff',
        backdropFilter: scrolled ? 'blur(14px)' : 'none',
        borderBottom: '1px solid var(--line)',

        <div className="container" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', height: 76 }}>
          <a href="#home"><Logo size={40}/></a>
          <nav className="dn" style={{ display: 'flex', alignItems: 'center', gap: 2 }}>
            {ROUTES.map(item => {
              const active = current === item.id;
              return (
                <a key={item.id} href={`#${item.id}`} style={{
                  padding: '10px 14px', fontSize: 13.5,
                  fontWeight: active ? 600 : 500,
                  color: active ? 'var(--ink-900)' : 'var(--ink-500)',
                  position: 'relative',
                }}>
                  {item.label}
                  {active && <span style={{ position: 'absolute', bottom: -1, left: 14, right: 14, height: 2, background: 'var(--accent)' }}/>}
                </a>
              );
            })}
          </nav>
          <div className="dn" style={{ display: 'flex', gap: 10 }}>
            <a className="btn btn-ghost" href="#bao-hanh" style={{ padding: '10px 14px' }}>Kiểm tra BH</a>
            <a className="btn btn-primary" href="#lien-he">Báo giá →</a>
          </div>
          <button className="mb" onClick={() => setOpen(!open)} style={{ display: 'none', background: 'none', border: 'none', padding: 6 }}>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
        </div>
        {open && (
          <div style={{ borderTop: '1px solid var(--line)', padding: '12px 20px 20px', background: '#fff' }}>
            {ROUTES.map(r => (
              <a key={r.id} href={`#${r.id}`} onClick={() => setOpen(false)} style={{ display: 'block', padding: '12px 0', fontSize: 15, borderBottom: '1px solid var(--line-soft)', color: current === r.id ? 'var(--accent-600)' : 'var(--ink-700)', fontWeight: current === r.id ? 600 : 500 }}>{r.label}</a>
            ))}
          </div>
        )}
      </header>
      <style>{`
        @media (max-width: 980px) { .dn { display: none !important; } .mb { display: inline-flex !important; } }
      `}</style>
    </>
  );
}

    </footer>
  );
}

/* === TWEAKS === */
function Tweaks({ cur, onChange }) {
  const [on, setOn] = React.useState(false);
  React.useEffect(() => {
    const h = (e) => {
      if (e.data?.type === '__activate_edit_mode') setOn(true);
      if (e.data?.type === '__deactivate_edit_mode') setOn(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);
  if (!on) return null;
  return (
    <div style={{ position: 'fixed', bottom: 24, right: 24, background: 'rgba(10,22,40,0.96)', backdropFilter: 'blur(16px)', border: '1px solid rgba(201,169,97,0.3)', borderRadius: 14, padding: 20, color: '#fff', zIndex: 999, minWidth: 260, boxShadow: '0 20px 60px rgba(0,0,0,0.4)' }}>
      <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--gold-light)', letterSpacing: '0.2em', marginBottom: 14 }}>TWEAKS</div>
      <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.6)', marginBottom: 10 }}>Accent color</div>
      <div style={{ display: 'flex', gap: 8 }}>
        {Object.entries(ACCENT_PRESETS).map(([k, p]) => (
          <button key={k} onClick={() => onChange(k)} style={{ flex: 1, padding: 12, borderRadius: 8, background: cur === k ? 'rgba(255,255,255,0.08)' : 'transparent', border: `1px solid ${cur === k ? p.main : 'rgba(255,255,255,0.12)'}`, color: '#fff', fontSize: 11, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, cursor: 'pointer' }}>
            <span style={{ width: 20, height: 20, borderRadius: '50%', background: p.main }}/>
            <span style={{ textTransform: 'capitalize' }}>{k}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

/* === APP === */
function App() {
  const [route, setRoute] = useRoute();
  const [accent, setAccent] = React.useState(TWEAKS.accent);
  const onAcc = (k) => { applyAccent(k); setAccent(k); window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accent: k } }, '*'); };
  const pages = { home: HomePage, 'gioi-thieu': GioiThieuPage, 'san-pham': SanPhamPage, 'tin-tuc': TinTucPage, 'bao-hanh': BaoHanhPage, 'tuyen-dung': TuyenDungPage, 'lien-he': LienHePage };
  const Page = pages[route] || HomePage;
  const label = ROUTES.find(r => r.id === route)?.label || 'Home';
  return (
    <div data-screen-label={label}>
      <Header current={route}/>
      <Page/>
      <Footer/>
      <Tweaks cur={accent} onChange={onAcc}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
